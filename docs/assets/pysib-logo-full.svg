<svg width="430" height="200" viewBox="0 0 430 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>pysib logo</title>
  <desc>The pysib logo: an open feedback loop forming a circular mark with a central node, next to the pysib wordmark.</desc>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <circle cx="100" cy="100" r="62" fill="none" stroke="#0d9488" stroke-width="7" stroke-dasharray="300 90" stroke-dashoffset="40" stroke-linecap="round" transform="rotate(-30 100 100)" marker-end="url(#ah)"/>
  <circle cx="100" cy="100" r="22" fill="#2563eb"/>
  <text x="190" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="84" font-weight="500" fill="#1e293b">pysib</text>
