site_name: pysib
site_description: System Identification Toolbox — Slow is Better
site_author: Diego Eckhard
repo_url: https://github.com/diegoeck/pysib
repo_name: diegoeck/pysib
site_url: https://pysib.net/

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - toc:
      permalink: true
