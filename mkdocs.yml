site_name: pysib
site_description: System Identification Toolbox — Slow is Better
site_author: Diego Eckhard
repo_url: https://github.com/diegoeck/pysib
repo_name: diegoeck/pysib
site_url: https://pysib.net/

theme:
  name: material
  logo: assets/pysib-icon-light.svg
  favicon: assets/pysib-icon-light.svg
  palette:
    primary: blue
    accent: teal
  features:
    - navigation.sections
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - Basic Concepts: basic-concepts.md
  - User Guide:
      - Model Structures: model-structures.md
      - Choosing an Estimator: choosing-an-estimator.md
      - Prediction and Simulation: prediction-simulation.md
      - Examples: examples.md
  - API Reference:
      - Estimators: api/estimators.md
      - Prediction and Simulation: api/prediction-simulation.md
      - Utilities: api/utilities.md
  - Changelog: changelog.md
  - Publications:
      - User Manual: manual/main.pdf
      - ACM TOMS Paper: paper-toms/main.pdf
      - SYSID 2027 Paper: paper-sysid-2027/main.pdf

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - toc:
      permalink: true
